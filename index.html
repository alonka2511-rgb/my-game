
       <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>משחק התאמה של הילדים</title>
    <style>
        body { font-family: sans-serif; background-color: #f7f7f7; text-align: center; margin: 0; padding: 20px; }
        .instruction { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        
        .grid { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            margin: 20px auto; max-width: 800px; padding: 15px; background: white; border-radius: 15px;
        }

        .card { 
            width: 120px; height: 120px; border: 3px solid #ddd; border-radius: 10px; 
            cursor: pointer; object-fit: cover; transition: 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        .selected { border-color: #ff9f43; box-shadow: 0 0 15px #ff9f43; }

        .slot { 
            width: 120px; height: 120px; border: 3px dashed #aaa; border-radius: 10px; 
            background: #eee; position: relative; cursor: pointer;
        }
        .slot img { 
            width: 100%; height: 100%; object-fit: cover; border-radius: 8px; 
            display: none; /* התמונה מוסתרת בהתחלה */
        }
        
        .matched { border: 3px solid #2ecc71 !important; background: #e8f9f0 !important; }
        .matched img { display: block !important; } /* התמונה מופיעה רק כשזה מצליח */
        
        .hidden { visibility: hidden; pointer-events: none; }
        #cheer { font-size: 30px; color: #2ecc71; font-weight: bold; height: 40px; margin: 10px; }
    </style>
</head>
<body>

    <h1>משחק התאמת תמונות ⭐</h1>
    <div id="cheer"></div>
    <div class="instruction">1. לחץ על תמונה כאן:</div>
    
    <div class="grid" id="topGrid"></div>
    
    <hr>
    
    <div class="instruction">2. עכשיו לחץ על הריבוע המתאים בלוח:</div>
    <div class="grid" id="bottomGrid"></div>

    <script>
        // רשימת התמונות עם סיומת jpg
        const images = [
            'IMG-20260313-WA0000.jpg', 'IMG-20260313-WA0001.jpg', 'IMG-20260313-WA0002.jpg',
            'IMG-20260313-WA0003.jpg', 'IMG-20260313-WA0004.jpg', 'IMG-20260313-WA0005.jpg',
            'IMG-20260313-WA0006.jpg', 'IMG-20260313-WA0007.jpg', 'IMG-20260313-WA0008.jpg',
            'IMG-20260313-WA0009.jpg'
        ];

        let currentSelection = null;
        let currentElement = null;

        const topGrid = document.getElementById('topGrid');
        const bottomGrid = document.getElementById('bottomGrid');
        const cheerDiv = document.getElementById('cheer');

        // יצירת התמונות למעלה (מעורבב)
        [...images].sort(() => Math.random() - 0.5).forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'card';
            img.onclick = () => {
                if (currentElement) currentElement.classList.remove('selected');
                currentSelection = src;
                currentElement = img;
                img.classList.add('selected');
                cheerDiv.innerText = ""; // איפוס הודעה
            };
            topGrid.appendChild(img);
        });

        // יצירת הלוח למטה
        images.forEach(src => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            
            const img = document.createElement('img');
            img.src = src;
            slot.appendChild(img);

            slot.onclick = () => {
                if (currentSelection === src) {
                    // הצלחה!
                    slot.classList.add('matched');
                    currentElement.classList.add('hidden');
                    cheerDiv.innerText = "כל הכבוד! 🎉";
                    currentSelection = null;
                    currentElement = null;
                } else if (currentSelection) {
                    // טעות
                    cheerDiv.innerText = "נסה שוב! 😊";
                    cheerDiv.style.color = "#e74c3c";
                    setTimeout(() => { cheerDiv.style.color = "#2ecc71"; }, 1000);
                }
            };
            bottomGrid.appendChild(slot);
        });
    </script>
</body>
</html>
