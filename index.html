<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק התאמה מושלם</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff0f5; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        h1 { color: #ff69b4; font-size: 28px; }
        #game-board, #targets { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(255,105,180,0.2); }
        .image-container, .target { width: 85px; height: 85px; border: 3px solid #ffd1dc; border-radius: 15px; overflow: hidden; cursor: pointer; transition: transform 0.2s; background: #fff; }
        img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .selected { border: 4px solid #ff1493; transform: scale(1.1); box-shadow: 0 0 15px #ff1493; }
        
        /* כאן ביטלתי את השקיפות - עכשיו הן יראו רגיל לגמרי */
        .target img { opacity: 1; filter: none; } 
        
        .matched { border: 4px solid #32cd32; background: #e8f5e9; pointer-events: none; animation: pop 0.3s ease-out; }
        .hidden { visibility: hidden; }
        #win-message { display: none; font-size: 32px; color: #ff1493; font-weight: bold; margin: 20px; animation: bounce 1s infinite; }
        button { padding: 15px 40px; font-size: 22px; background: #ff69b4; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 0 #d44d91; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>המשחק של הילד 🎈</h1>
    <button id="start-btn" onclick="initGame()">לחצו להתחלה! ▶️</button>
    <div id="win-message">ניצחתם! איזה אלופים! 🏆</div>

    <div id="game-board"></div>
    <div id="targets"></div>

    <script>
        const images = [
            'IMG-20260313-WA0000.jpg', 'IMG-20260313-WA0001.jpg',
            'IMG-20260313-WA0002.jpg', 'IMG-20260313-WA0003.jpg',
            'IMG-20260313-WA0004.jpg', 'IMG-20260313-WA0005.jpg',
            'IMG-20260313-WA0006.jpg', 'IMG-20260313-WA0007.jpg',
            'IMG-20260313-WA0008.jpg', 'IMG-20260313-WA0009.jpg'
        ];

        let selectedImgSrc = null;
        let selectedElement = null;
        let matchesFound = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'match') {
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                [523, 659, 783, 1046].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
                    o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
                });
            }
        }

        function initGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('win-message').style.display = 'none';
            matchesFound = 0;
            selectedImgSrc = null;
            selectedElement = null;
            const board = document.getElementById('game-board');
            const targets = document.getElementById('targets');
            board.innerHTML = '';
            targets.innerHTML = '';

            const shuffled = [...images].sort(() => Math.random() - 0.5);
            shuffled.forEach(imgSrc => {
                const div = document.createElement('div');
                div.className = 'image-container';
                div.innerHTML = `<img src="${imgSrc}">`;
                div.onclick = () => {
                    if (selectedElement) selectedElement.classList.remove('selected');
                    selectedImgSrc = imgSrc;
                    selectedElement = div;
                    div.classList.add('selected');
                };
                board.appendChild(div);
            });

            images.forEach(imgSrc => {
                const div = document.createElement('div');
                div.className = 'target';
                div.id = 'target-' + imgSrc.replace(/\./g, '_');
                div.innerHTML = `<img src="${imgSrc}">`;
                div.onclick = () => {
                    if (selectedImgSrc === imgSrc) {
                        playSound('match');
                        div.classList.add('matched');
                        selectedElement.classList.add('hidden');
                        selectedImgSrc = null;
                        selectedElement = null;
                        matchesFound++;
                        if (matchesFound === images.length) {
                            setTimeout(() => playSound('win'), 300);
                            document.getElementById('win-message').style.display = 'block';
                        }
                    } else if (selectedImgSrc) {
                        div.style.borderColor = 'red';
                        setTimeout(() => div.style.borderColor = '#ffd1dc', 500);
                    }
                };
                targets.appendChild(div);
            });
        }
    </script>
</body>
</html>
